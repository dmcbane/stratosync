name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            arch_label: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            arch_label: aarch64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install native dependencies (for tests on x86_64)
        if: matrix.arch == 'amd64'
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (native x86_64 only)
        if: matrix.arch == 'amd64'
        run: cargo test --workspace

      - name: Build release binaries
        run: cross build --release --workspace --target ${{ matrix.target }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── Package: tarball ──
      - name: Create tarball
        run: |
          DIST="stratosync-${{ steps.version.outputs.version }}-linux-${{ matrix.arch_label }}"
          mkdir -p "$DIST"
          cp target/${{ matrix.target }}/release/stratosyncd "$DIST/"
          cp target/${{ matrix.target }}/release/stratosync "$DIST/"
          cp target/${{ matrix.target }}/release/stratosync-tray "$DIST/" 2>/dev/null || true
          cp contrib/systemd/stratosyncd.service "$DIST/"
          cp contrib/nautilus/stratosync_nautilus.py "$DIST/"
          cp contrib/desktop/stratosync-tray.desktop "$DIST/"
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "$DIST/"
          tar czf "$DIST.tar.gz" "$DIST"

      # ── Package: .deb ──
      - name: Build .deb package
        run: |
          mkdir -p deb-root/usr/bin
          mkdir -p deb-root/usr/lib/systemd/user
          mkdir -p deb-root/usr/share/nautilus-python/extensions
          mkdir -p deb-root/usr/share/applications
          mkdir -p deb-root/DEBIAN

          cp target/${{ matrix.target }}/release/stratosyncd deb-root/usr/bin/
          cp target/${{ matrix.target }}/release/stratosync deb-root/usr/bin/
          cp target/${{ matrix.target }}/release/stratosync-tray deb-root/usr/bin/ 2>/dev/null || true
          cp contrib/systemd/stratosyncd.service deb-root/usr/lib/systemd/user/
          cp contrib/nautilus/stratosync_nautilus.py deb-root/usr/share/nautilus-python/extensions/
          cp contrib/desktop/stratosync-tray.desktop deb-root/usr/share/applications/ 2>/dev/null || true

          cat > deb-root/DEBIAN/control << CTRL
          Package: stratosync
          Version: ${{ steps.version.outputs.version }}
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.arch }}
          Depends: libfuse3-3, fuse3, rclone
          Recommends: python3-nautilus
          Maintainer: Dale McBane <noreply@example.com>
          Description: Linux cloud sync daemon with on-demand FUSE3 filesystem
           Stratosync provides a FUSE3 virtual filesystem backed by rclone,
           supporting 70+ cloud storage providers with on-demand hydration,
           automatic upload, and conflict-safe bidirectional sync.
          CTRL
          sed -i 's/^          //' deb-root/DEBIAN/control

          dpkg-deb --build deb-root "stratosync_${{ steps.version.outputs.version }}_${{ matrix.arch }}.deb"

      # ── Package: .rpm ──
      - name: Build .rpm package
        run: |
          sudo apt-get update && sudo apt-get install -y rpm

          RPM_ARCH="${{ matrix.arch_label }}"
          # RPM uses aarch64 not arm64
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}

          # Create the installed file tree directly in BUILDROOT
          BROOT="rpmbuild/BUILDROOT/stratosync-${VERSION}-1.${RPM_ARCH}"
          mkdir -p "$BROOT/usr/bin"
          mkdir -p "$BROOT/usr/lib/systemd/user"
          mkdir -p "$BROOT/usr/share/nautilus-python/extensions"
          mkdir -p "$BROOT/usr/share/applications"
          mkdir -p "$BROOT/usr/share/licenses/stratosync"
          mkdir -p "$BROOT/usr/share/doc/stratosync"

          cp target/${{ matrix.target }}/release/stratosyncd "$BROOT/usr/bin/"
          cp target/${{ matrix.target }}/release/stratosync "$BROOT/usr/bin/"
          cp target/${{ matrix.target }}/release/stratosync-tray "$BROOT/usr/bin/" 2>/dev/null || true
          cp contrib/systemd/stratosyncd.service "$BROOT/usr/lib/systemd/user/"
          cp contrib/nautilus/stratosync_nautilus.py "$BROOT/usr/share/nautilus-python/extensions/"
          cp contrib/desktop/stratosync-tray.desktop "$BROOT/usr/share/applications/" 2>/dev/null || true
          cp LICENSE-MIT LICENSE-APACHE "$BROOT/usr/share/licenses/stratosync/"
          cp README.md CHANGELOG.md "$BROOT/usr/share/doc/stratosync/"

          cat > rpmbuild/SPECS/stratosync.spec << 'SPEC'
          Name:           stratosync
          Version:        VERSION_PLACEHOLDER
          Release:        1
          Summary:        Linux cloud sync daemon with on-demand FUSE3 filesystem
          License:        MIT OR Apache-2.0
          URL:            https://github.com/dmcbane/stratosync
          AutoReqProv:    no

          %description
          Stratosync provides a FUSE3 virtual filesystem backed by rclone,
          supporting 70+ cloud storage providers with on-demand hydration,
          automatic upload, and conflict-safe bidirectional sync.

          %files
          /usr/bin/stratosyncd
          /usr/bin/stratosync
          /usr/bin/stratosync-tray
          /usr/lib/systemd/user/stratosyncd.service
          /usr/share/nautilus-python/extensions/stratosync_nautilus.py
          /usr/share/applications/stratosync-tray.desktop
          /usr/share/licenses/stratosync/LICENSE-MIT
          /usr/share/licenses/stratosync/LICENSE-APACHE
          /usr/share/doc/stratosync/README.md
          /usr/share/doc/stratosync/CHANGELOG.md
          SPEC
          sed -i 's/^          //' rpmbuild/SPECS/stratosync.spec
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" rpmbuild/SPECS/stratosync.spec

          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
                   --define "_rpmdir $(pwd)/rpmbuild/RPMS" \
                   --target "${RPM_ARCH}" \
                   -bb rpmbuild/SPECS/stratosync.spec

          # Move RPM to predictable location
          find rpmbuild/RPMS -name "*.rpm" -exec cp {} "stratosync-${VERSION}-1.${RPM_ARCH}.rpm" \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch_label }}
          path: |
            stratosync-*-linux-${{ matrix.arch_label }}.tar.gz
            stratosync_*_${{ matrix.arch }}.deb
            stratosync-*.${{ matrix.arch_label }}.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la stratosync*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            stratosync-*-linux-*.tar.gz
            stratosync_*.deb
            stratosync-*.rpm
